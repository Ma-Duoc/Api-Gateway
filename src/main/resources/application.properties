spring.cloud.gateway.routes[3].id=ms-salas
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/salas/**

# =========================================================
# MS HISTORIAL
# =========================================================
spring.cloud.gateway.routes[4].id=ms-historial
